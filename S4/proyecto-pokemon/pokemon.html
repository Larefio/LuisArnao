<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Título</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding: 0;
      margin: 0;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    article {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background-image: url('https://moewalls.com/wp-content/uploads/2023/01/tatsumaki-x-fubuki-one-punch-man-thumb-1.jpg');
      background-size: cover;
      background-position: center;
    }

    div {
      background-color: #01050880;
      max-width: 512px;
      color: rgba(77, 203, 249, 0.647);
      text-align: center;
      border-radius: 10px;
      border: 2px solid rgba(77, 203, 249, 0.647);
      padding: 20px;
    }

    h1 {
      font-size: 48px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
    }

    a {

      padding: 16px 32px;
      background-color: #7C3BED;
      color: white;
      font-size: 16px;
      border-radius: 32px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main>
    <article>
      <div>
        <h1>Anime Gallery de One Punch Man</h1>
        <p>Explora el universo de One Punch Man con nuestra galería de imágenes y personajes, </p>
        <a href="#">Explorar Anime</a>
      </div>
    </article>
  </main>
</body>

</html>
