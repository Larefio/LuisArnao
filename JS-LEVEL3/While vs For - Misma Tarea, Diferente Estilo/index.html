<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter While Basic</title>
</head>
 
<body>
  <h1>Counter While Basic</h1>
 
  <script>
    let start = 3;
    let end = 8;
    let sum = 0;
    let current = start;
 
    while (current <= end) {
      console.log(current);
      sum += current;
      current++;
    };
 
    console.log(`Sum: ${sum}`);
  </script>
</body>
 
</html>
