<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Counter For</title>
</head>
 
<body>
  <h1>Magic Counter For</h1>
 
 
  <script>
    let start = 1;
    let end = 3;
    let sum = 0;
 
    for (let index = start; index <= end; index++) {
      sum = sum + index;
      console.log(index);
    };
 
    console.log(`Total: ${sum}`);
    console.log('fin');
  </script>
</body>
 
</html>
