<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convertidor-Relámpago - Unary-Plus</title>
  </head>

  <body>
    <h1>Convertidor-Relámpago - Unary-Plus</h1>
  <script>
    const age = '42';
    const pi = '3.14';
    const width = '100px';
    const height = '50.5px';
 
    // Convert age using unary +
    const ageNumber = +age;
 
    // Convert pi using unary +
    const piNumber = +pi;
 
    // Extract number from width using parseInt()
    const widthNumber = parseInt(width);
 
    // Extract number from height using parseFloat()
    const heightNumber = parseFloat(height);
 
    console.log(ageNumber);
    console.log(piNumber);
    console.log(widthNumber);
    console.log(heightNumber);
  </script>
  </body>
</html>
