  <body>
    <title>➕ Operadores Matemáticos 🧮</title>
    <h1>➕ Operadores Matemáticos 🧮</h1>
    <h5>🔢 Revisa los cálculos en la consola 🧮</h5>
    <script>
        const number1 = 8;
        const number2 = 5;
        //Calcula sum
        const sum = number1 + number2;
        //Calcula resta
        const rest = number1 - number2;
        //Calcula multiplicacion 
        const multi = number1 * number2;
        //calcula divicion 
        const div = number1 / number2;

        //resultado

        console.log(sum)
        console.log(rest)
        console.log(multi)
        console.log(div)

    </script>
  </body>
